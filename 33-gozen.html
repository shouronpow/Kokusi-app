    { "q": "問80 透熱灸を据える際、皮膚との間に空気を入れないようにすることを何というか。", "o": ["1. 密着", "2. 硬ひねり", "3. 軟ひねり", "4. 直置"], "a": 1 },
    { "q": "問81 お灸の後にできる水疱の原因で最も多いのはどれか。", "o": ["1. 低温やけど", "2. 高温やけど", "3. 感染", "4. アレルギー"], "a": 2 },
    { "q": "問82 糖尿病患者への施灸で最も注意すべきことはどれか。", "o": ["1. 血糖値の上昇", "2. 傷の治りの遅さ", "3. 空腹感", "4. 血圧の低下"], "a": 2 },
    { "q": "問83 肩関節外転の基本軸はどれか。", "o": ["1. 肩甲棘", "2. 肩峰を通る垂直線", "3. 上腕骨体", "4. 体幹の中央線"], "a": 2 },
    { "q": "問84 第6頸髄(C6)レベルの機能残存で可能になる動作はどれか。", "o": ["1. 自力での呼吸", "2. 手首の背屈", "3. 指の屈曲", "4. 肘の伸展"], "a": 2 },
    { "q": "問85 ブルンストローム・ステージで「共同運動がわずかに出現する」のは第何ステージか。", "o": ["1. ステージ1", "2. ステージ2", "3. ステージ3", "4. ステージ4"], "a": 2 },
    { "q": "問86 パーキンソン病のリハビリテーションで推奨されるのはどれか。", "o": ["1. 絶対安静", "2. 大きな動作の反復訓練", "3. 筋力の最大負荷訓練", "4. 視覚刺激の排除"], "a": 2 },
    { "q": "問87 70歳男性。階段を登る際に息切れがし、下肢に浮腫がある。疑われる疾患はどれか。", "o": ["1. 喘息", "2. 心不全", "3. 肝硬変", "4. 貧血"], "a": 2 },
    { "q": "問88 45歳女性。疲れやすく、首の前が腫れている。動悸と手の震えがある。疑われる疾患はどれか。", "o": ["1. バセドウ病", "2. 橋本病", "3. 低血糖", "4. 更年期障害"], "a": 1 },
    { "q": "問89 徒手筋力テスト(MMT)で、抵抗に抗して全可動域動かせるレベルはどれか。", "o": ["1. レベル2", "2. レベル3", "3. レベル4", "4. レベル5"], "a": 2 },
    { "q": "問90 診断確定のために行う検査はどれか。", "o": ["1. 病理組織検査", "2. CT検査", "3. PET検査", "4. MRI検査"], "a": 1 }
];

let cur = 0, results = [];
function show() {
    const q = questions[cur];
    document.getElementById('q-info').innerText = `問題 ${cur + 1} / ${questions.length}`;
    document.getElementById('q-text').innerText = q.q;
    const div = document.getElementById('opts'); div.innerHTML = '';
    q.o.forEach((o, i) => {
        const b = document.createElement('button'); b.className = 'opt-btn';
        b.innerText = o; b.onclick = () => { results.push(i + 1); cur++; cur < questions.length ? show() : finish(); };
        div.appendChild(b);
    });
}
function finish() {
    document.getElementById('quiz-ui').style.display='none';
    document.getElementById('res-ui').style.display='block';
    let ok = 0; const list = document.getElementById('review-list');
    questions.forEach((q, i) => {
        const isOk = results[i] === q.a; if(isOk) ok++;
        const card = document.createElement('div'); card.className = `card ${isOk ? 'ok' : 'ng'}`;
        card.innerHTML = `<strong>問${i+1}: ${isOk ? '○' : '×'}</strong><br>${q.q}<br><small>正答: ${q.o[q.a-1]}</small>`;
        list.appendChild(card);
    });
    const p = Math.round((ok/questions.length)*100);
    document.getElementById('score-text').innerText = `${p}% (${ok}/${questions.length})`;
    const adv = document.getElementById('ai-advice');
    if(p >= 80) adv.innerText = "素晴らしい！合格ラインを大幅に超えています。この調子で維持しましょう！";
    else if(p >= 60) adv.innerText = "合格圏内です！間違えた問題を復習して、さらに確実なものにしましょう。";
    else adv.innerText = "基礎知識を再確認しましょう。特に間違えた科目を重点的に復習です！";
    new Chart(document.getElementById('chart'), { type: 'doughnut', data: { datasets: [{ data: [ok, questions.length-ok], backgroundColor: ['#005BAC', '#ddd'], borderWidth:0 }] } });
}
show();
</script>
