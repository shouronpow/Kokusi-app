<style>

.q-text { font-weight: bold; font-size: 1.3rem; margin: 20px 0; line-height: 1.6; text-align: left; }

.opt-btn:hover { background: var(--light); border-color: var(--blue); }
#review-list { max-height: 400px; overflow-y: auto; margin-top: 20px; border-top: 2px solid var(--light); padding-top: 15px; }

.ok { background: #d4edda; border-color: #28a745; color: #155724; }
.ng { background: #f8d7da; border-color: #dc3545; color: #721c24; }
.advice { background:#eef; padding:20px; border-radius:15px; margin:20px 0; border-left:8px solid #005BAC; font-weight:bold; color:#005BAC; text-align:left; line-height:1.6; }
</style>
</head>
<body>

        <div id="ai-advice" class="advice"></div>
        <div id="review-list"></div>
        <button onclick="location.reload()" style="margin-top:25px; padding:18px 45px; background:var(--blue); color:white; border:none; border-radius:35px; font-size:1.2rem; font-weight:bold; cursor:pointer;">最初から解く</button>
        <button onclick="location.href='index.html'" style="margin-top:10px; padding:10px 20px; background:#666; color:white; border:none; border-radius:35px; font-size:1rem; cursor:pointer;">メニューに戻る</button>
    </div>
</div>
