let cur = 0, results = [];
function show() {
    const q = questions[cur];
    document.getElementById('q-info').innerText = `問題 ${cur + 1} / ${questions.length}`;
    document.getElementById('q-text').innerText = q.q;
    const div = document.getElementById('opts'); div.innerHTML = '';
    q.o.forEach((o, i) => {
        const b = document.createElement('button'); b.className = 'opt-btn';
        b.innerText = o; b.onclick = () => { results.push(i + 1); cur++; cur < questions.length ? show() : finish(); };
        div.appendChild(b);
    });
}

function finish() {
    document.getElementById('quiz-ui').style.display='none';
    document.getElementById('res-ui').style.display='block';
    let ok = 0; 
    const answeredCount = results.length; 
    const list = document.getElementById('review-list');
    list.innerHTML = ''; 
    
    questions.forEach((q, i) => {
        const card = document.createElement('div');
        const qNum = i + 91; // 午後の表示番号

        if (i < answeredCount) {
            const isOk = results[i] === q.a;
            if(isOk) ok++;
            card.className = `card ${isOk ? 'ok' : 'ng'}`;
            card.innerHTML = `<strong>問${qNum}: ${isOk ? '○' : '×'}</strong><br>${q.q}<br><small>正答: ${q.o[q.a-1]}</small>`;
        } else {
            card.className = `card not-answered`; 
            card.innerHTML = `<strong>問${qNum}: 未回答</strong><br>${q.q}<br><small>正答: ${q.o[q.a-1]}</small>`;
        }
        list.appendChild(card);
    });

    const p = answeredCount > 0 ? Math.round((ok/answeredCount)*100) : 0;
    document.getElementById('score-text').innerText = `正解率: ${p}%`;
    document.getElementById('progress-text').innerText = `回答数: ${answeredCount} / 全${questions.length}問 (正解数: ${ok})`;
    
    new Chart(document.getElementById('chart'), { 
        type: 'doughnut', 
        data: { 
            datasets: [{ 
                data: [ok, answeredCount - ok, questions.length - answeredCount], 
                backgroundColor: ['#005BAC', '#dc3545', '#eeeeee'], 
                borderWidth:0 
            }] 
        } 
    });
}
show();
</script>
