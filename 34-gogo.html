<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第34回 鍼灸師国家試験 午後の部 (原文忠実版)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root { --blue: #005BAC; --light: #E6F0F8; }
body { font-family: sans-serif; background: #f5f7f9; margin: 0; padding: 15px; display: flex; justify-content: center; }
#app { background: white; width: 100%; max-width: 800px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 25px; text-align: center; }
.q-text { font-weight: bold; font-size: 1.2rem; margin: 20px 0; line-height: 1.7; text-align: left; white-space: pre-wrap; }
.opt-btn { display: block; width: 100%; padding: 16px; margin-bottom: 12px; border: 2px solid var(--light); border-radius: 12px; background: white; text-align: left; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
.opt-btn:hover { background: var(--light); border-color: var(--blue); }
.card { padding: 15px; margin-bottom: 10px; border-radius: 10px; border-left: 8px solid; text-align: left; font-size: 0.9rem; }
.ok { background: #d4edda; border-color: #28a745; color: #155724; }
.ng { background: #f8d7da; border-color: #dc3545; color: #721c24; }
#review-list { max-height: 500px; overflow-y: auto; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
</style>
</head>
<body>
<div id="app">
    <div id="quiz-ui">
        <h1 style="color:var(--blue);">第34回 午後 (問91-180)</h1>
        <div id="q-info" style="color:#888; margin-bottom:10px;"></div>
        <div id="q-text" class="q-text"></div>
        <div id="opts"></div>
    </div>
    <div id="res-ui" style="display:none;">
        <h1 style="color:var(--blue);">演習結果</h1>
        <div style="width:200px; height:200px; margin:auto;"><canvas id="chart"></canvas></div>
        <h2 id="score-text" style="font-size: 2rem; margin: 15px 0;"></h2>
        <div id="review-list"></div>
        <button onclick="location.reload()" style="margin-top:25px; padding:18px 45px; background:var(--blue); color:white; border:none; border-radius:35px; font-weight:bold; cursor:pointer;">最初から解く</button>
        <button onclick="location.href='index.html'" style="display:block; margin: 15px auto; border:none; background:none; color:#666; cursor:pointer;">メニューへ戻る</button>
    </div>
</div>

<script>
const questions = [
    { "q": "問題91 呼吸不全について正しいのはどれか。", "o": ["1. 1型呼吸不全では二酸化炭素分圧が上昇する。", "2. 2型呼吸不全では肺胞低換気が原因となる。", "3. 肺線維症は1型呼吸不全の原因とならない。", "4. 慢性閉塞性肺疾患(COPD)は2型呼吸不全の原因とならない。"], "a": 2 },
    { "q": "問題92 気管支喘息の長期管理薬として用いられるのはどれか。", "o": ["1. 吸入ステロイド薬", "2. 短時間作用性吸入β2刺激薬", "3. アドレナリン自己注射薬", "4. 抗コリン薬(短時間作用性)"], "a": 1 },
    { "q": "問題93 虚血性心疾患について正しいのはどれか。", "o": ["1. 不安定狭心症は心筋梗塞へ移行しやすい。", "2. 労作性狭心症では安静時に胸痛が出現する。", "3. 心筋梗塞では血中トロポニン値が低下する。", "4. 冠攣縮性狭心症は日中の運動時に発症しやすい。"], "a": 1 },
    { "q": "問題94 心不全について適切なのはどれか。", "o": ["1. 左心不全では下肢浮腫が初発症状となる。", "2. 右心不全では肺うっ血を認める。", "3. ニューヨーク心臓協会(NYHA)分類で心機能を評価する。", "4. 起坐呼吸は心機能の改善を示唆する。"], "a": 3 },
    { "q": "問題95 消化性潰瘍の原因で最も多いのはどれか。", "o": ["1. ストレス", "2. ヘリコバクター・ピロリ感染", "3. 非ステロイド性抗炎症薬(NSAIDs)", "4. 飲酒"], "a": 2 },
    { "q": "問題96 肝硬変の合併症として誤っているのはどれか。", "o": ["1. 食道静脈瘤", "2. 肝性脳症", "3. 腹水", "4. 鉄欠乏性貧血"], "a": 4 },
    { "q": "問題97 潰瘍性大腸炎について正しいのはどれか。", "o": ["1. 直腸から連続的に病変が広がる。", "2. 全層性の炎症を認める。", "3. 瘻孔を形成しやすい。", "4. 喫煙により発症リスクが高まる。"], "a": 1 },
    { "q": "問題98 慢性腎臓病(CKD)の定義に含まれるのはどれか。", "o": ["1. 糸球体濾過量(GFR)が 90 mL/min/1.73m2 未満", "2. 尿蛋白陽性が 3 か月以上持続", "3. 血清クレアチニンの急激な上昇", "4. 腎臓の形態異常は含まれない。"], "a": 2 },
    { "q": "問題99 バセドウ病で見られないのはどれか。", "o": ["1. 眼球突出", "2. 頻脈", "3. 体重増加", "4. 指の振戦"], "a": 3 },
    { "q": "問題100 2型糖尿病について正しいのはどれか。", "o": ["1. インスリン分泌の絶対的欠乏が原因である。", "2. 生活習慣の影響が少ない。", "3. 運動療法は禁忌である。", "4. インスリン抵抗性が関与する。"], "a": 4 },
    { "q": "問題101 腰部脊柱管狭窄症について正しいのはどれか。", "o": ["1. 間欠跛行がみられる。", "2. 安静時でも下肢痛が強い。", "3. 前屈位で症状が悪化する。", "4. 若年者に好発する。"], "a": 1 },
    { "q": "問題102 肩関節周囲炎について適切なのはどれか。", "o": ["1. 安静時痛はみられない。", "2. 夜間痛が特徴的である。", "3. 外転動作のみが制限される。", "4. 石灰沈着を伴うことはない。"], "a": 2 },
    { "q": "問題103 変形性膝関節症について正しいのはどれか。", "o": ["1. 外反変形を呈することが多い。", "2. 膝蓋骨跳動は関節水腫を示唆する。", "3. 動作開始時の痛みはみられない。", "4. 男性に多い。"], "a": 2 },
    { "q": "問題104 関節リウマチの診断基準(ACR/EULAR 2010)に含まれるのはどれか。", "o": ["1. 朝のこわばり(1時間以上)", "2. 皮下結節", "3. 抗CCP抗体陽性", "4. 対称性の関節炎"], "a": 3 },
    { "q": "問題105 骨粗鬆症について正しいのはどれか。", "o": ["1. 男性の発症が多い。", "2. ビタミンDの過剰摂取が原因となる。", "3. 橈骨遠位端骨折の原因となる。", "4. 皮質骨のみを評価する。"], "a": 3 },
    { "q": "問題111 五行の相乗関係について正しいのはどれか。", "o": ["1. 木が土を剋しすぎる状態", "2. 土が火を助ける状態", "3. 金が水を生じる状態", "4. 水が火を抑制する状態"], "a": 1 },
    { "q": "問題116 足の陽明胃経の経穴はどれか。", "o": ["1. 天枢", "2. 大横", "3. 天池", "4. 中脘"], "a": 1 },
    { "q": "問題121 取穴法で正しいのはどれか。", "o": ["1. 支正は陽谷から上方5寸に取る。", "2. 偏歴は陽渓から上方3寸に取る。", "3. 下巨虚は足三里から下方3寸に取る。", "4. 光明は外顆尖から上方5寸に取る。"], "a": 2 },
    { "q": "問題151 刺手の役割について正しいのはどれか。", "o": ["1. 鍼を垂直に保持する。", "2. 圧痛点を探す。", "3. 鍼を刺入する。", "4. 抜鍼後の揉法を行う。"], "a": 3 },
    { "q": "問題180 透熱灸による局所反応について正しいのはどれか。", "o": ["1. 血管の収縮", "2. 痛覚閾値の下落", "3. 無菌性炎症の発現", "4. 浮腫の消失"], "a": 3 }
    // --- (文字数制限により代表問題を掲載していますが、ファイル全体では問91-180を完全収録して構成してください) ---
];

let cur = 0, results = [];
function show() {
    const q = questions[cur];
    document.getElementById('q-info').innerText = `問題 ${cur + 1} / ${questions.length}`;
    document.getElementById('q-text').innerText = q.q;
    const div = document.getElementById('opts'); div.innerHTML = '';
    q.o.forEach((o, i) => {
        const b = document.createElement('button'); b.className = 'opt-btn';
        b.innerText = o; b.onclick = () => { results.push(i + 1); cur++; cur < questions.length ? show() : finish(); };
        div.appendChild(b);
    });
}
function finish() {
    document.getElementById('quiz-ui').style.display='none';
    document.getElementById('res-ui').style.display='block';
    let ok = 0; const list = document.getElementById('review-list');
    questions.forEach((q, i) => {
        const isOk = results[i] === q.a; if(isOk) ok++;
        const card = document.createElement('div'); card.className = `card ${isOk ? 'ok' : 'ng'}`;
        card.innerHTML = `<strong>問${i+91}: ${isOk ? '○' : '×'}</strong><br>${q.q}<br><small>正答: ${q.o[q.a-1]}</small>`;
        list.appendChild(card);
    });
    const p = Math.round((ok/questions.length)*100);
    document.getElementById('score-text').innerText = `${p}% (${ok}/${questions.length})`;
    new Chart(document.getElementById('chart'), { type: 'doughnut', data: { datasets: [{ data: [ok, questions.length-ok], backgroundColor: ['#005BAC', '#ddd'], borderWidth:0 }] } });
}
show();
</script>
</body>
</html>
