<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鍼灸師国家試験 演習メニュー</title>
    <style>
        :root { --blue: #005BAC; --light: #E6F0F8; --accent: #FF9500; }
        body { font-family: sans-serif; background: #f5f7f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
        #app { background: white; width: 100%; max-width: 600px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px; text-align: center; }
        h1 { color: var(--blue); font-size: 1.6rem; margin-bottom: 30px; border-bottom: 3px solid var(--light); padding-bottom: 10px; }
        
        .year-card { background: #fff; border: 2px solid var(--light); border-radius: 18px; padding: 20px; margin-bottom: 25px; transition: 0.3s; }
        .year-card:hover { border-color: var(--blue); transform: translateY(-2px); }
        .year-title { font-size: 1.2rem; font-weight: bold; color: #333; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        .new-badge { background: var(--accent); color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 5px; margin-left: 10px; }
        
        .btn-group { display: flex; gap: 12px; }
        .nav-btn { flex: 1; padding: 15px; border: 2px solid var(--blue); border-radius: 30px; background: white; color: var(--blue); font-weight: bold; text-decoration: none; font-size: 1rem; transition: 0.2s; }
        .nav-btn:hover { background: var(--blue); color: white; }

        .subject-section { margin-top: 40px; text-align: left; }
        .subject-title { font-size: 1rem; color: #666; margin-bottom: 15px; text-align: center; }
        .subject-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .sub-btn { padding: 12px; border: 1px solid #ddd; border-radius: 12px; background: #fafafa; color: #444; font-size: 0.9rem; cursor: pointer; transition: 0.2s; }
        .sub-btn:hover { background: var(--light); color: var(--blue); border-color: var(--blue); }
    </style>
</head>
<body>
<div id="app">
    <h1>鍼灸国試 過去問演習</h1>

    <div class="year-card">
        <div class="year-title">第34回（令和7年度）<span class="new-badge">最新</span></div>
        <div class="btn-group">
            <a href="34-gozen.html" class="nav-btn">午前の部</a>
            <a href="34-gogo.html" class="nav-btn">午後の部</a>
        </div>
    </div>

    <div class="year-card">
        <div class="year-title">第33回（令和6年度）</div>
        <div class="btn-group">
            <a href="33-gozen.html" class="nav-btn">午前の部</a>
            <a href="33-gogo.html" class="nav-btn">午後の部</a>
        </div>
    </div>

    <div class="subject-section">
        <div class="subject-title">▼ 科目別特化（全年度まとめ）</div>
        <div class="subject-grid">
            <button class="sub-btn" onclick="location.href='subject-anatomy.html'">解剖学</button>
            <button class="sub-btn" onclick="location.href='subject-physiology.html'">生理学</button>
            <button class="sub-btn" onclick="location.href='subject-oriental.html'">東洋医学概論</button>
            <button class="sub-btn" onclick="location.href='subject-theory.html'">はり・きゅう理論</button>
        </div>
    </div>
</div>
</body>
</html>
