    { "q": "問172 灸刺激が血液凝固系に与える影響はどれか。", "o": ["1. 凝固時間を延長させる", "2. 凝固を促進させる", "3. 変化させない", "4. 血小板を減少させる"], "a": 2, "s": "きゅう理論" },
    { "q": "問173 施灸部位の消毒に一般的に用いられるのはどれか。", "o": ["1. オキシドール", "2. 消毒用エタノール", "3. ポビドンヨード", "4. 次亜塩素酸ナトリウム"], "a": 2, "s": "きゅう理論" },
    { "q": "問174 糖尿病患者への施灸で特に注意すべきことはどれか。", "o": ["1. 感染しやすい", "2. 火傷が治りにくい", "3. 知覚が鈍麻している", "4. 全て正しい"], "a": 4, "s": "きゅう理論" },
    { "q": "問175 顔面部への施灸において避けるべきなのはどれか。", "o": ["1. 透熱灸", "2. 知熱灸", "3. 温灸", "4. 噴霧灸"], "a": 1, "s": "きゅう理論" },
    { "q": "問176 はり師、きゅう師が、医師の同意を得て行うことで療養費の支給対象となる疾患はどれか。", "o": ["1. 神経痛", "2. リウマチ", "3. 腰痛症", "4. 全て正しい"], "a": 4, "s": "はり理論・きゅう理論" },

    { "q": "問178 (前問の症例) 関係する神経はどれか。", "o": ["1. 橈骨神経", "2. 正中神経", "3. 尺骨神経", "4. 筋皮神経"], "a": 1, "s": "はり理論・きゅう理論" },

    { "q": "問180 (前問の症例) 三陰交で交わる三つの経脈はどれか。", "o": ["1. 肝・心・脾", "2. 肝・脾・腎", "3. 脾・肺・腎", "4. 心・肝・肺"], "a": 2, "s": "はり理論・きゅう理論" }
];
    

let currentSet = [];
let cur = 0;
let results = [];

function startQuiz(mode) {
    currentSet = (mode === 'am') ? am_questions : pm_questions;
    document.getElementById('start-ui').style.display = 'none';
    document.getElementById('quiz-ui').style.display = 'block';
    document.getElementById('res-title').innerText = (mode === 'am' ? "午前の部" : "午後の部") + " 結果診断";
    cur = 0; results = [];
    show();
}

function show() {
    const q = currentSet[cur];
    if(!q) return;
    document.getElementById('q-info').innerText = `問題 ${cur + 1} / ${currentSet.length}`;
    document.getElementById('q-text').innerText = q.q;
    const div = document.getElementById('opts'); div.innerHTML = '';
    
    q.o.forEach((o, i) => {
        const b = document.createElement('button');
        b.className = 'opt-btn';
        b.innerText = o;
        b.onclick = () => {
            results.push(i + 1);
            cur++;
            cur < currentSet.length ? show() : finish();
        };
        div.appendChild(b);
    });

    const endBtn = document.createElement('button');
    endBtn.innerText = "途中で終了して成績を見る";
    endBtn.style.cssText = "margin-top:40px; padding:10px; background:none; border:none; color:#999; text-decoration:underline; cursor:pointer; font-size:0.9rem;";
    endBtn.onclick = () => {
        if(confirm("ここまでの回答で成績を診断しますか？")) finish();
    };
    div.appendChild(endBtn);
}

function finish() {
    document.getElementById('quiz-ui').style.display = 'none';
    document.getElementById('res-ui').style.display = 'block';
    let ok = 0;
    const list = document.getElementById('review-list'); list.innerHTML = '';
    
    currentSet.forEach((q, i) => {
        const userAns = results[i];
        if(!userAns) return; // 未回答は表示しない
        
        const isOk = userAns === q.a;
        if(isOk) ok++;
        
        const card = document.createElement('div');
        card.className = `card ${isOk ? 'ok' : 'ng'}`;
        card.innerHTML = `<strong>${isOk ? '○' : '×'} 問${q.q.match(/問(\d+)/)[1]}</strong><br>${q.q}<br><small style="display:block; margin-top:5px; border-top:1px solid rgba(0,0,0,0.1); padding-top:5px;">正解: ${q.o[q.a-1]}</small>`;
        list.appendChild(card);
    });

    const total = results.length;
    const p = total === 0 ? 0 : Math.round((ok/total)*100);
    document.getElementById('score-text').innerText = `${p}% (${ok} / ${total}問中)`;
    
    let msg = "";
    if(p >= 80) msg = "【AI診断：合格圏内】素晴らしい！基礎から応用まで完璧に固まっています。この調子で本試験も突破しましょう！";
    else if(p >= 60) msg = "【AI診断：合格ライン】まずは6割突破おめでとうございます！間違えた問題を復習すれば、さらに盤石になります。";
    else msg = "【AI診断：基礎強化が必要】焦らず、まずは教科書で間違えた分野を再確認しましょう。一つ一つの積み重ねが合格への近道です！";
    
    document.getElementById('ai-advice').innerHTML = `💡 AI診断アドバイス：<br>${msg}`;

    new Chart(document.getElementById('chart'), {
        type: 'doughnut',
        data: {
            datasets: [{
                data: [ok, total - ok],
                backgroundColor: ['#005BAC', '#ddd'],
                borderWidth: 0
            }]
        },
        options: { cutout: '75%' }
    });
}
</script>
