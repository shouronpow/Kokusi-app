<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鍼灸国試アプリ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f5f7f9; padding: 20px; text-align: center; }
        #app { background: white; border-radius: 20px; padding: 20px; max-width: 500px; margin: auto; }
        .opt-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #E6F0F8; border-radius: 10px; background: white; }
    </style>
</head>
<body>
<div id="app">
    <div id="q-text" style="font-weight:bold; font-size:1.2rem; margin-bottom:20px;"></div>
    <div id="opts"></div>
</div>
<script>
const questions = [
    {"q":"問1:指定難病で受給者数が最も多いのは？","o":["1.パーキンソン病","2.潰瘍性大腸炎","3.全身性エリテマトーデス","4.クローン病"],"a":1},
    {"q":"問2:あはき施術者の倫理で正しいのは？","o":["1.施術者本位","2.利益優先","3.家族の要求優先","4.患者の苦痛への共感"],"a":4},
    {"q":"問3:名称独占と業務独占の両方があるのは？","o":["1.理学療法士","2.作業療法士","3.保健師","4.看護師"],"a":4},
    {"q":"問4:介護保険制度で正しいのは？","o":["1.保険者は県","2.75歳以上","3.認定区分は5つ","4.改定は毎年"],"a":3},
    {"q":"問5:自然に健康になれる環境づくりは何次予防？","o":["1.0次予防","2.1次予防","3.2次予防","4.3次予防"],"a":1}
];
let i = 0;
function show() {
    const q = questions[i];
    document.getElementById('q-text').innerText = q.q;
    const div = document.getElementById('opts'); div.innerHTML = '';
    q.o.forEach((o, idx) => {
        const b = document.createElement('button'); b.className = 'opt-btn';
        b.innerText = o; b.onclick = () => { i++; if(i < questions.length){ show(); }else{ alert('終了！'); } };
        div.appendChild(b);
    });
}
show();
</script>
</body>
</html>
