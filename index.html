let current = 0; let results = [];
function show() {
const q = questions[current];
if(!q) return;
document.getElementById('q-info').innerText = `問題 ${current + 1} / ${questions.length}`;
document.getElementById('q-text').innerText = q.question;
const container = document.getElementById('opts');
container.innerHTML = '';
q.options.forEach((opt, i) => {
const btn = document.createElement('button');
btn.className = 'opt-btn';
btn.innerText = `${i + 1}. ${opt}`;
btn.onclick = () => { results.push(i + 1); current++; current < questions.length ? show() : finish(); };
container.appendChild(btn);
});
}
function finish() {
document.getElementById('quiz-ui').style.display='none';
document.getElementById('res-ui').style.display='block';
let correct = 0;
const list = document.getElementById('review-list');
questions.forEach((q, i) => {
const isOk = results[i] === q.answer;
if(isOk) correct++;
const card = document.createElement('div');
card.className = `card ${isOk ? 'ok' : 'ng'}`;
card.innerHTML = `<strong>問${i+1}: ${isOk ? '○' : '×'}</strong><br>${q.question}<br><small>正答: ${q.options[q.answer-1]}</small>`;
list.appendChild(card);
});
const percent = Math.round((correct/questions.length)*100);
document.getElementById('score-text').innerText = `${percent}% (${correct}/${questions.length})`;

const adviceArea = document.getElementById('ai-advice');
adviceArea.className = 'advice';
let msg = "";
if(percent >= 80) msg = "【AI診断：合格圏内】素晴らしい！基礎が完璧に固まっています。この調子で頑張りましょう！";
else if(percent >= 60) msg = "【AI診断：あと一歩】合格ラインまでわずか！間違えた問題を重点的に復習しましょう。";
else msg = "【AI診断：基礎強化が必要】焦らず間違えた問題を教科書で再確認しましょう！";
adviceArea.innerHTML = `💡 AI診断アドバイス：<br>${msg}`;

new Chart(document.getElementById('chart'), { type: 'doughnut', data: { datasets: [{ data: [correct, questions.length-correct], backgroundColor: ['#005BAC', '#ddd'], borderWidth:0 }] }, options: { cutout:'75%' } });
}
show();
</script>
