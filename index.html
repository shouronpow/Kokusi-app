<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第34回 鍼灸国試 演習（科目別対応版）</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root { --blue: #005BAC; --light: #E6F0F8; --gray: #f5f7f9; }
body { font-family: sans-serif; background: var(--gray); margin: 0; padding: 20px; display: flex; justify-content: center; }
#app { background: white; width: 100%; max-width: 850px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 30px; text-align: center; }
.mode-selector { display: flex; gap: 15px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
.btn-mode { padding: 15px 30px; border-radius: 35px; border: 2px solid var(--blue); cursor: pointer; font-weight: bold; background: white; color: var(--blue); font-size: 1.1rem; transition: 0.3s; }
.btn-mode:hover { background: var(--light); }
.btn-subject { padding: 10px 20px; border-radius: 10px; border: 1px solid #ccc; cursor: pointer; background: #fff; font-size: 0.9rem; transition: 0.2s; }
.btn-subject:hover { border-color: var(--blue); background: var(--light); }
.q-text { font-weight: bold; font-size: 1.4rem; margin: 25px 0; line-height: 1.7; text-align: left; white-space: pre-wrap; }
.opt-btn { display: block; width: 100%; padding: 20px; margin-bottom: 12px; border: 2px solid var(--light); border-radius: 15px; background: white; text-align: left; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
.opt-btn:hover { background: var(--light); }
#review-list { margin-top: 30px; border-top: 2px solid var(--light); padding-top: 20px; }
.card { padding: 18px; margin-bottom: 12px; border-radius: 12px; border-left: 10px solid; text-align: left; font-size: 0.95rem; line-height: 1.5; }
.ok { background: #d4edda; border-color: #28a745; color: #155724; }
.ng { background: #f8d7da; border-color: #dc3545; color: #721c24; }
.advice { background: var(--light); padding: 25px; border-radius: 15px; margin: 25px 0; border-left: 10px solid var(--blue); font-weight: bold; text-align: left; line-height: 1.6; }
table { width:100%; border-collapse: collapse; margin-top: 15px; }
th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
</style>
</head>
<body>
<div id="app">
    <div id="start-ui">
        <h1 style="color:var(--blue);">第34回 鍼灸師国家試験</h1>
        
        <p style="font-weight:bold; margin-top:30px;">▼ 時間帯で一気に解く</p>
        <div class="mode-selector">
            <button class="btn-mode" onclick="startQuiz('am')">午前の部 (問1-90)</button>
            <button class="btn-mode" onclick="startQuiz('pm')">午後の部 (問91-180)</button>
        </div>

        <p style="font-weight:bold; margin-top:30px;">▼ 科目別に絞って解く</p>
        <div id="subject-list" class="mode-selector">
            </div>
    </div>

    <div id="quiz-ui" style="display:none;">
        <div id="q-info" style="color:#888; font-weight: bold;"></div>
        <div id="q-text" class="q-text"></div>
        <div id="opts"></div>
    </div>

    <div id="res-ui" style="display:none;">
        <h1 id="res-title" style="color:var(--blue);">演習結果</h1>
        <div style="width:220px; height:220px; margin:auto;"><canvas id="chart"></canvas></div>
        <h2 id="score-text"></h2>
        <div id="ai-advice" class="advice"></div>
        <div id="review-list"></div>
        <button onclick="location.reload()" class="btn-mode" style="margin-top: 30px; background:var(--blue); color:#fff;">TOPに戻る</button>
    </div>
</div>

<script>
// --- ここにあなたの第34回全問データ（am_questions, pm_questions）を配置 ---
