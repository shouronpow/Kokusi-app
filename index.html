<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第34回 鍼灸国試 完全版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #005BAC; --light: #E6F0F8; --red: #dc3545; }
        body { font-family: sans-serif; background: #f5f7f9; margin: 0; padding: 10px; display: flex; justify-content: center; }
        #app { background: white; width: 100%; max-width: 800px; border-radius: 20px; padding: 20px; text-align: center; }
        .q-text { font-weight: bold; font-size: 1.3rem; margin: 20px 0; text-align: left; }
        .opt-btn { display: block; width: 100%; padding: 16px; margin-bottom: 10px; border: 2px solid var(--light); border-radius: 12px; background: white; text-align: left; font-size: 1.1rem; }
        #review-container { text-align: left; margin: 20px 0; padding: 15px; border: 2px solid var(--red); border-radius: 15px; background: #fffafa; }
        .review-ans { color: var(--red); font-weight: bold; }
    </style>
</head>
<body>
<div id="app">
    <div id="quiz-ui">
        <h2 id="q-info" style="color:#888;"></h2>
        <div id="q-text" class="q-text">読み込み中...</div>
        <div id="opts"></div>
    </div>
    <div id="res-ui" style="display:none;">
        <h1 style="color:var(--blue);">演習結果</h1>
        <h2 id="score-text"></h2>
        <div style="width:180px; height:180px; margin:auto;"><canvas id="chart"></canvas></div>
        <div id="review-container">
            <h3 style="color:var(--red); text-align:center;">🚩 間違えた問題の復習</h3>
            <div id="wrong-answers-list"></div>
        </div>
        <button onclick="location.reload()" style="margin-top:20px; padding:15px 30px; background:var(--blue); color:white; border:none; border-radius:30px; font-weight:bold;">最初から解く</button>
    </div>
</div>
<script>
const questions = [
    {"q":"問1 指定難病で受給者証所持者数が最も多いのは？","o":["1.パーキンソン病","2.潰瘍性大腸炎","3.全身性エリテマトーデス","4.クローン病"],"a":1},
    {"q":"問2 あはき施術者の倫理について正しいのは？","o":["1.施術者本位","2.利益優先","3.患者家族の要求優先","4.患者の苦痛への共感"],"a":4},
    {"q":"問3 業務独占を伴う医療従事者はどれか？","o":["1.理学療法士","2.作業療法士","3.保健師","4.看護師"],"a":4},
    {"q":"問4 介護保険制度について正しいのはどれか？","o":["1.保険者は都道府県","2.被保険者は75歳以上","3.要介護の認定区分は5つ","4.報酬の改定は毎年"],"a":3},
    {"q":"問5 健康日本21(第三次)の環境づくりは何次予防？","o":["1.0次予防","2.1次予防","3.2次予防","4.3次予防"],"a":1},
    {"q":"問6 児童虐待相談において主な虐待者として最も多いのは？","o":["1.実母","2.実父","3.実母以外の母親","4.実父以外の父親"],"a":1},
    {"q":"問7 結核患者が使用した食器の洗浄に必要かつ十分なのは？","o":["1.ビグアナイド系","2.塩素系","3.逆性石けん","4.中性洗剤"],"a":4},
    {"q":"問8 緊急措置入院における入院期限は？","o":["1.24時間","2.72時間","3.1週間","4.1か月間"],"a":2},
    {"q":"問9 就学時健康診断を行うのは？","o":["1.学校","2.保健所","3.都道府県医師会","4.市町村教育委員会"],"a":4},
    {"q":"問10 特定の病気をもつ者の割合を示す疫学指標は？","o":["1.罹患率","2.有病率","3.偽陽性率","4.偽陰性率"],"a":2}
];
let idx = 0, res = [];
function show() {
    const q = questions[idx];
    document.getElementById('q-info').innerText = `問題 ${idx + 1} / ${questions.length}`;
    document.getElementById('q-text').innerText = q.q;
    const div = document.getElementById('opts'); div.innerHTML = '';
    q.o.forEach((o, i) => {
        const b = document.createElement('button'); b.className = 'opt-btn';
        b.innerText = o; b.onclick = () => next(i + 1);
        div.appendChild(b);
    });
}
function next(sel) {
    const q = questions[idx];
    res.push({ q: q.q, opts: q.o, correct: q.a, ok: sel === q.a });
    idx++;
    if (idx < questions.length) { show(); } else { result(); }
}
function result() {
    document.getElementById('quiz-ui').style.display = 'none';
    document.getElementById('res-ui').style.display = 'block';
    const score = res.filter(r => r.ok).length;
    document.getElementById('score-text').innerText = `得点: ${score} / ${questions.length}`;
    const list = document.getElementById('wrong-answers-list'); list.innerHTML = '';
    res.filter(r => !r.ok).forEach(r => {
        const item = document.createElement('div');
        item.innerHTML = `<p><b>${r.q}</b><br><span class="review-ans">✅ 正解：${r.opts[r.correct-1]}</span></p>`;
        list.appendChild(item);
    });
    new Chart(document.getElementById('chart'), {
        type: 'doughnut',
        data: { labels: ['正解', '不正解'], datasets: [{ data: [score, questions.length - score], backgroundColor: ['#28a745', '#dc3545'] }] },
        options: { responsive: true, maintainAspectRatio: false }
    });
}
show();
</script>
</body>
</html>
